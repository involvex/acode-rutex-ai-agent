<style>
	/* ── Reset & Tokens ───────────────────────────── */
	*,
	*::before,
	*::after {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}

	#ai-panel {
		--accent: var(--active-color, var(--button-background-color, #1337ec));
		--accent-dim: var(--button-active-color, var(--active-icon-color, #0d28b8));
		--accent-hi: var(--active-color, var(--button-background-color, #3d5ff5));
		--accent-glow: color-mix(in srgb, var(--accent) 15%, transparent);
		--accent-glow2: color-mix(in srgb, var(--accent) 8%, transparent);
		--bg: var(--primary-color, #0e0e14);
		--bg-card: var(--secondary-color, #13131c);
		--bg-input: var(--popup-background-color, var(--secondary-color, #1a1a26));
		--bg-hover: color-mix(in srgb, var(--text) 6%, transparent);
		--bg-code: var(--secondary-color, #0a0a12);
		--border: var(--border-color, rgba(255, 255, 255, 0.07));
		--border-hi: var(
			--popup-border-color,
			var(--border-color, rgba(255, 255, 255, 0.12))
		);
		--text: var(--secondary-text-color, #ddddf0);
		--text-muted: color-mix(in srgb, var(--text) 75%, transparent);
		--text-dim: color-mix(in srgb, var(--text) 55%, transparent);
		--on-accent: var(--button-text-color, #fff);
		--success: var(--success-color, var(--link-text-color, #4ade80));
		--danger: var(--danger-color, #ef4444);
		--radius: 10px;
		--mono: 'DM Mono', 'Fira Mono', 'Cascadia Code', monospace;
		--ui: 'Syne', 'Space Grotesk', sans-serif;
	}

	#ai-panel {
		display: flex;
		flex-direction: column;
		width: 100%;
		height: 100%;
		min-height: 0;
		position: relative;
		background: var(--bg);
		font-family: var(--ui);
		color: var(--text);
		font-size: 13px;
		overflow: hidden;
		-webkit-font-smoothing: antialiased;
	}

	/* ── Header ───────────────────────────────────── */
	.panel-header {
		flex-shrink: 0;
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 9px 10px 8px;
		background: var(--bg-card);
		border-bottom: 1px solid var(--border);
		position: relative;
		z-index: 10;
	}
	.panel-header::after {
		content: '';
		position: absolute;
		bottom: 0;
		left: 0;
		right: 0;
		height: 1px;
		background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
		opacity: 0.4;
	}
	.header-brand {
		display: flex;
		align-items: center;
		gap: 7px;
	}
	.brand-dot {
		width: 6px;
		height: 6px;
		border-radius: 50%;
		background: var(--accent);
		box-shadow: 0 0 7px var(--accent);
		animation: blink 2.8s ease-in-out infinite;
	}
	@keyframes blink {
		0%,
		100% {
			opacity: 1;
			box-shadow: 0 0 7px var(--accent);
		}
		50% {
			opacity: 0.4;
			box-shadow: 0 0 2px var(--accent);
		}
	}
	.brand-name {
		font-size: 11px;
		font-weight: 700;
		letter-spacing: 0.1em;
		text-transform: uppercase;
		color: var(--text);
	}
	.brand-name em {
		color: var(--accent);
		font-style: normal;
	}
	.header-actions {
		display: flex;
		gap: 2px;
		align-items: center;
	}
	.hbtn {
		width: 28px;
		height: 28px;
		border-radius: 7px;
		border: none;
		background: transparent;
		color: var(--text-muted);
		cursor: pointer;
		display: flex;
		align-items: center;
		justify-content: center;
		transition:
			background 0.15s,
			color 0.15s;
	}
	.hbtn:hover {
		background: var(--bg-hover);
		color: var(--text);
	}
	.hbtn svg {
		width: 14px;
		height: 14px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}

	/* ── Context Bar ──────────────────────────────── */
	.ctx-bar {
		flex-shrink: 0;
		padding: 5px 10px;
		background: var(--bg);
		border-bottom: 1px solid var(--border);
		display: flex;
		flex-wrap: wrap;
		gap: 5px;
		align-items: center;
	}
	.ctx-label {
		font-size: 9px;
		font-family: var(--mono);
		text-transform: uppercase;
		letter-spacing: 0.08em;
		color: var(--text-dim);
		margin-right: 2px;
	}
	.ctx-chip {
		display: inline-flex;
		align-items: center;
		gap: 5px;
		background: var(--bg-card);
		border: 1px solid var(--border-hi);
		border-radius: 5px;
		padding: 2px 6px 2px 5px;
		font-size: 10px;
		font-family: var(--mono);
		color: var(--text-muted);
		animation: chip-in 0.15s ease-out;
	}
	@keyframes chip-in {
		from {
			opacity: 0;
			transform: scale(0.9);
		}
		to {
			opacity: 1;
			transform: scale(1);
		}
	}
	.ctx-chip svg {
		width: 10px;
		height: 10px;
		stroke: var(--accent);
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}
	.ctx-chip-name {
		max-width: 100px;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	.ctx-remove {
		background: none;
		border: none;
		cursor: pointer;
		color: var(--text-dim);
		padding: 0;
		line-height: 1;
		display: flex;
		align-items: center;
		transition: color 0.1s;
	}
	.ctx-remove:hover {
		color: var(--text-muted);
	}
	.ctx-remove svg {
		width: 9px;
		height: 9px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2.5;
		stroke-linecap: round;
	}
	.ctx-add-btn {
		background: none;
		border: none;
		cursor: pointer;
		color: var(--text-dim);
		font-size: 9px;
		font-family: var(--mono);
		display: flex;
		align-items: center;
		gap: 3px;
		padding: 2px 4px;
		border-radius: 4px;
		transition:
			color 0.15s,
			background 0.15s;
	}
	.ctx-add-btn:hover {
		color: var(--accent);
		background: var(--accent-glow2);
	}
	.ctx-add-btn svg {
		width: 10px;
		height: 10px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
	}
	.ctx-menu {
		position: absolute;
		min-width: 170px;
		max-width: min(75vw, 280px);
		max-height: 180px;
		padding: 4px;
		background: var(--bg-card);
		border: 1px solid var(--border-hi);
		border-radius: 8px;
		display: none;
		flex-direction: column;
		gap: 2px;
		box-shadow: 0 10px 22px rgba(0, 0, 0, 0.32);
		overflow-y: auto;
		z-index: 40;
	}
	.ctx-menu.open {
		display: flex;
	}
	.ctx-menu-option,
	.ctx-menu-empty {
		font-size: 10px;
		font-family: var(--mono);
		padding: 6px 7px;
		border-radius: 5px;
		word-break: break-word;
	}
	.ctx-menu-option {
		cursor: pointer;
		border: none;
		text-align: left;
		background: transparent;
		color: var(--text-muted);
	}
	.ctx-menu-option:hover {
		background: var(--bg-hover);
		color: var(--text);
	}
	.ctx-menu-empty {
		color: var(--text-dim);
	}

	/* ── Model Bar ────────────────────────────────── */
	.model-bar {
		flex-shrink: 0;
		display: flex;
		align-items: center;
		gap: 6px;
		padding: 5px 10px;
		border-bottom: 1px solid var(--border);
		background: var(--bg-card);
	}
	.model-label {
		font-size: 9px;
		font-family: var(--mono);
		text-transform: uppercase;
		letter-spacing: 0.1em;
		color: var(--text-dim);
	}
	.model-select {
		flex: 1;
		background: var(--bg-input);
		border: 1px solid var(--border);
		border-radius: 5px;
		color: var(--text-muted);
		font-family: var(--mono);
		font-size: 10px;
		padding: 3px 7px;
		outline: none;
		cursor: pointer;
		appearance: none;
		-webkit-appearance: none;
		transition:
			border-color 0.15s,
			color 0.15s;
	}
	.model-select:focus {
		border-color: var(--accent);
		color: var(--text);
	}

	/* ── Edited Files Bar ─────────────────────────── */
	.edited-files-bar {
		flex-shrink: 0;
		display: none;
		flex-direction: column;
		gap: 6px;
		padding: 7px 10px;
		background: var(--bg-card);
		border-bottom: 1px solid var(--border);
	}
	.edited-files-bar.opened {
		display: flex;
	}
	.edited-files-head {
		display: flex;
		justify-content: flex-end;
	}
	.edited-files-bulk-btn {
		background: transparent;
		border: 1px solid var(--border-hi);
		border-radius: 5px;
		padding: 2px 7px;
		color: var(--text-muted);
		font-family: var(--mono);
		font-size: 9px;
		line-height: 1.2;
		cursor: pointer;
	}
	.edited-files-list {
		display: flex;
		flex-direction: column;
		gap: 5px;
	}
	.edited-file-option {
		display: flex;
		align-items: center;
		gap: 6px;
		padding: 5px 7px;
		border: 1px solid var(--border);
		border-radius: 7px;
		background: var(--bg-input);
	}
	.edited-file-name {
		flex: 1;
		min-width: 0;
		font-family: var(--mono);
		font-size: 10px;
		color: var(--text);
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	.edited-file-added,
	.edited-file-removed {
		font-family: var(--mono);
		font-size: 10px;
	}
	.edited-file-added {
		color: var(--success);
	}
	.edited-file-removed {
		color: var(--danger);
	}
	.edited-file-action {
		width: 20px;
		height: 20px;
		border: none;
		border-radius: 5px;
		background: transparent;
		color: var(--text-dim);
		display: flex;
		align-items: center;
		justify-content: center;
		cursor: pointer;
	}
	.edited-file-action svg {
		width: 12px;
		height: 12px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}
	.edited-file-action.accept {
		color: var(--success);
	}
	.edited-file-action.reject {
		color: var(--danger);
	}

	/* ── Messages ─────────────────────────────────── */
	.msgs-wrap {
		flex: 1;
		overflow-y: auto;
		overflow-x: hidden;
		min-height: 0;
		display: flex;
		flex-direction: column;
		-webkit-overflow-scrolling: touch;
	}
	.msgs-wrap::-webkit-scrollbar {
		width: 2px;
		height: 2px;
	}
	.msgs-wrap::-webkit-scrollbar-thumb {
		background: var(--text-dim);
		border-radius: 2px;
	}
	.msgs-inner {
		display: flex;
		flex-direction: column;
		padding: 10px 0 8px;
		flex: 1;
	}

	/* ── Empty State ──────────────────────────────── */
	.empty-state {
		flex: 1;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		padding: 20px 14px;
		text-align: center;
		gap: 10px;
	}
	.empty-icon-wrap {
		width: 40px;
		height: 40px;
		background: var(--accent-glow);
		border: 1px solid var(--border-hi);
		border-radius: 11px;
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.empty-icon-wrap svg {
		width: 19px;
		height: 19px;
		stroke: var(--accent);
		fill: none;
		stroke-width: 1.7;
		stroke-linecap: round;
		stroke-linejoin: round;
	}
	.empty-title {
		font-size: 12px;
		font-weight: 700;
		color: var(--text);
	}
	.empty-sub {
		font-size: 10px;
		color: var(--text-muted);
		line-height: 1.55;
		font-family: var(--mono);
	}
	.suggestions {
		display: flex;
		flex-direction: column;
		gap: 5px;
		width: 100%;
		margin-top: 4px;
	}
	.sug-chip {
		background: var(--bg-card);
		border: 1px solid var(--border);
		border-radius: 7px;
		padding: 7px 9px;
		font-size: 10px;
		font-family: var(--mono);
		color: var(--text-muted);
		cursor: pointer;
		text-align: left;
		display: flex;
		align-items: center;
		gap: 7px;
		transition:
			border-color 0.15s,
			color 0.15s,
			background 0.15s;
		line-height: 1.4;
	}
	.sug-chip:hover {
		border-color: var(--accent);
		color: var(--text);
		background: var(--accent-glow2);
	}
	.sug-chip svg {
		width: 12px;
		height: 12px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
		flex-shrink: 0;
		opacity: 0.7;
	}

	/* ── Message Row ──────────────────────────────── */
	.msg-row {
		padding: 4px 5px 2px;
		position: relative;
		animation: msg-in 0.18s ease-out both;
	}
	/*	.msg-row {
		padding: 8px 10px 4px;
		position: relative;
		animation: msg-in 0.18s ease-out both;
	} */
	@keyframes msg-in {
		from {
			opacity: 0;
			transform: translateY(5px);
		}
		to {
			opacity: 1;
			transform: translateY(0);
		}
	}
	.msg-row:hover .msg-actions {
		opacity: 1;
		pointer-events: auto;
	}
	.msg-row.user {
		display: flex;
		flex-direction: column;
		align-items: flex-end;
	}
	.msg-row.assistant {
		display: flex;
		flex-direction: column;
		align-items: flex-start;
	}
	.msg-row.assistant {
		border-top: 1px solid var(--border);
		padding-top: 12px;
		margin-top: 4px;
	}
	.msg-row.assistant:first-of-type {
		border-top: none;
		margin-top: 0;
	}

	.msg-meta {
		display: flex;
		align-items: center;
		gap: 5px;
		margin-bottom: 5px;
		padding: 0 2px;
	}
	.msg-avatar {
		width: 16px;
		height: 16px;
		border-radius: 4px;
		display: flex;
		align-items: center;
		justify-content: center;
		flex-shrink: 0;
	}
	.msg-avatar.user-av {
		background: var(--accent);
	}
	.msg-avatar.ai-av {
		background: var(--bg-card);
		border: 1px solid var(--border-hi);
	}
	.msg-avatar svg {
		width: 9px;
		height: 9px;
		fill: none;
		stroke: currentColor;
		stroke-width: 2.5;
		stroke-linecap: round;
		stroke-linejoin: round;
	}
	.msg-avatar.user-av svg {
		stroke: var(--on-accent);
	}
	.msg-avatar.ai-av svg {
		stroke: var(--accent);
	}
	.msg-name {
		font-size: 10px;
		font-weight: 700;
		letter-spacing: 0.06em;
		text-transform: uppercase;
		color: var(--text-dim);
	}
	.msg-row.user .msg-name {
		color: var(--accent);
	}

	/* ── User bubble ──────────────────────────────── */
	.user-bubble {
		background: var(--accent);
		color: var(--on-accent);
		border-radius: 10px 10px 2px 10px;
		padding: 5px 7px;
		font-size: 12px;
		line-height: 1.55;
		max-width: 94%;
		word-break: break-word;
	}
	.user-ctx-chip {
		display: inline-flex;
		align-items: center;
		gap: 4px;
		background: rgba(255, 255, 255, 0.15);
		border-radius: 4px;
		padding: 1px 5px;
		font-size: 9.5px;
		font-family: var(--mono);
		margin-bottom: 5px;
		opacity: 0.9;
	}
	.user-ctx-chip svg {
		width: 9px;
		height: 9px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}

	/* ── AI Content ───────────────────────────────── */
	.ai-content {
		width: 100%;
		font-size: 12px;
		line-height: 1.7;
		color: var(--text);
		word-break: break-word;
	}
	.ai-content p {
		margin: 0 0 7px;
	}
	.ai-content p:last-child {
		margin-bottom: 0;
	}
	.ai-content h1,
	.ai-content h2,
	.ai-content h3 {
		font-weight: 700;
		color: var(--text);
		margin: 10px 0 5px;
		line-height: 1.3;
	}
	.ai-content h1 {
		font-size: 14px;
	}
	.ai-content h2 {
		font-size: 13px;
	}
	.ai-content h3 {
		font-size: 12px;
		color: var(--text-muted);
	}
	.ai-content ul,
	.ai-content ol {
		margin: 4px 0 8px 14px;
		display: flex;
		flex-direction: column;
		gap: 3px;
	}
	.ai-content li {
		font-size: 12px;
	}
	.ai-content strong {
		color: var(--text);
		font-weight: 700;
	}
	.ai-content em {
		color: var(--text-muted);
		font-style: italic;
	}
	.ai-content blockquote {
		border-left: 2px solid var(--accent);
		padding: 4px 0 4px 10px;
		color: var(--text-muted);
		margin: 6px 0;
		font-style: italic;
	}
	.ai-content code {
		background: var(--bg-code);
		border: 1px solid var(--border-hi);
		border-radius: 4px;
		padding: 1px 5px;
		font-family: var(--mono);
		font-size: 10.5px;
		color: var(--accent-hi);
		white-space: nowrap;
	}
	.ai-content .error {
		background: color-mix(in srgb, var(--danger) 12%, transparent);
		border: 1px solid var(--danger);
		color: var(--danger);
		padding: 4px 7px;
		border-radius: 5px;
		margin-bottom: 8px;
	}

	/* ── Code Block ───────────────────────────────── */
	.code-block {
		background: var(--bg-code);
		border: 1px solid var(--border-hi);
		border-radius: 7px;
		margin: 8px 0;
		overflow: hidden;
		padding: 0;
	}
	.code-header {
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 5px 8px;
		background: var(--bg-hover);
		border-bottom: 1px solid var(--border);
		border-radius: 7px 7px 0 0;
	}
	.code-lang:not(.edited) {
		text-transform: uppercase;
	}
	.code-lang {
		font-size: 9.5px;
		font-family: var(--mono);
		letter-spacing: 0.1em;
		color: var(--text-dim);
	}
	.code-btn {
		display: flex;
		align-items: center;
		gap: 4px;
		background: transparent;
		border: 1px solid var(--border);
		border-radius: 5px;
		padding: 2px 7px;
		font-size: 9px;
		font-family: var(--mono);
		color: var(--text-muted);
		cursor: pointer;
		transition:
			background 0.15s,
			border-color 0.15s,
			color 0.15s;
	}
	.code-btn:hover {
		background: var(--bg-hover);
		border-color: var(--border-hi);
		color: var(--text);
	}
	.code-btn.copied,
	.code-btn.inserted {
		color: var(--success);
		border-color: var(--success);
	}
	.code-btn svg {
		width: 10px;
		height: 10px;
		stroke: currentColor;
		fill: none;
		stroke-width: 2;
		stroke-linecap: round;
		stroke-linejoin: round;
	}
	.code-body:not(.edited-lines-body) {
		user-select: text;
		-webkit-user-select: text;
	}
	.code-body {
		padding: 8px;
		overflow-x: auto;
		overflow-y: auto;
		max-height: 200px;
		font-family: var(--mono);
		font-size: 11px;
		line-height: 1.6;
		color: var(--text-muted);
		white-space: pre;
		tab-size: 2;
		-moz-tab-size: 2;
		-webkit-tab-size: 2;
		text-indent: 0;
